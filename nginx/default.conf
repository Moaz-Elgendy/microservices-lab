# The client is built to static files (npm run build -> dist/) and those
# files are COPIED INTO this nginx image at Docker build time - there is no
# separate running "client" container/pod. Only "server" is a real upstream.
#
# In Kubernetes, "server" resolves via whatever you name your server Service
# (e.g. a Service literally named "server").

upstream server {
    server api:5000;
}

upstream client {
    server client:3000;
}

server {
    listen 80;

    # Static React build output. This path must match wherever your
    # Dockerfile copies client/dist into the nginx image.
    root /usr/share/nginx/html;
    index index.html;

    # Serve the client's static files; fall back to index.html for any
    # unmatched path so React Router (if you add it later) works too.
    location / {
        proxy_pass http://client;
        proxy_set_header Host localhost;
    }

    # /api/* -> the Express server, with /api stripped off
    location /api {
        rewrite /api/(.*) /$1 break;
        proxy_pass http://server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
