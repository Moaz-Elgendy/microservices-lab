services:
  postgres:
    restart: always
    image: postgres:16
    container_name: postgres-microservice
    environment:
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data  

  redis:
    restart: always
    image: redis:latest
    container_name: redis-microservice

  nginx:
    depends_on:
      - api
      - client
    restart: always
    image: nginx-lab:latest
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    container_name: nginx-microservice
    ports:
      - "3050:80"

  api:
    restart: always
    depends_on:
      - postgres
      - redis
    image: server-lab:latest
    container_name: api-microservice
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - /app/node_modules
      - ./server:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGUSER=postgres
      - PGHOST=postgres
      - PGDATABASE=postgres
      - PGPASSWORD=postgres_password
      - PGPORT=5432
    ports:
      - "5000:5000"  

  client:
    restart: always
    environment:
      - WDS_SOCKET_PORT=0
    image: client-lab:latest
    container_name: client-microservice
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - /app/node_modules
      - ./client:/app

  worker:
    restart: always
    depends_on:
      - redis
    image: worker-lab:latest
    container_name: worker-microservice
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    volumes:
      - /app/node_modules
      - ./worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  postgres_data: